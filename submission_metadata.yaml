ai_usage_summary: |
  I used Claude as a thinking partner during architecture design and debugging.
  All implementation decisions, code structure, and signal design reflect
  our own engineering judgment. No candidate data from candidates.jsonl
  was shared with any external tool.
  
  GPT-4o-mini is used in run_pipeline.py for JD parsing and reasoning card
  generation. This file is a research pipeline demonstrating the full
  HireSynth architecture and is not the submission ranker.
  
  The submission file rank.py makes zero external API calls during ranking,
  fully complying with the no-network constraint in the submission spec.


methodology_summary: |
  HireSynth is a five-signal rule-based ranker with no external API calls
  during ranking. It scores each of 100,000 candidates on:
  (1) Skills match against JD core skills using proficiency, endorsement,
  and duration weights, with a 0.1x title penalty for non-ML roles and
  a depth bonus for candidates matching 4 or more core skills.
  (2) Experience fit with 5-9 year ideal band, bidirectional detection
  of underqualified and overqualified candidates.
  (3) Behavioral signals from redrob_signals: activity recency, recruiter
  response rate, GitHub activity score, saved-by-recruiters count,
  open-to-work flag, interview completion rate, and profile completeness.
  (4) Location proximity to Pune and Noida.
  The system also includes a separate research pipeline (run_pipeline.py)
  with FAISS dense retrieval, BM25 sparse retrieval, Reciprocal Rank Fusion,
  GPT-4o-mini re-ranking, GitHub API enrichment, and NDCG evaluation
  achieving NDCG@20 of 0.9562 on a 30-candidate synthetic test set.
  Runtime for rank.py is approximately 5 seconds for 100,000 candidates
  on CPU with no network calls.

